<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuerdos de la Semana 🗓️✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cinzel:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap');

        :root {
            --bg-light-blue: #f2f7fc; /* Fondo general azul claro muy suave */
            --ice-blue: #e3edf7;      /* Contenedores y detalles en azul hielo */
            --sky-blue: #a8cceb;      /* Acentos y bordes estilo cielo */
            --deep-blue: #2c4a6f;      /* Texto principal en azul marino/acero oscuro */
            --pure-white: #ffffff;
        }

        body {
            background-color: var(--bg-light-blue);
            color: var(--deep-blue);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- ELEMENTOS FLOTANTES ANIMADOS --- */
        .falling-item {
            position: fixed;
            top: -60px; 
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            user-select: none;
            white-space: nowrap;
            animation: fallAndSway linear forwards;
        }

        @keyframes fallAndSway {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 0;
            }
            15% {
                opacity: 0.6; 
            }
            85% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(105vh) translateX(100px) rotate(25deg); 
                opacity: 0;
            }
        }

        .content-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .main-title {
            font-family: 'Cinzel', serif;
            font-size: 2.8rem;
            color: var(--deep-blue);
            margin: 0;
            letter-spacing: 2px;
        }

        .subtitle {
            font-family: 'Alex Brush', cursive;
            font-size: 2.4rem;
            color: var(--sky-blue);
            margin-top: 5px;
        }

        /* --- REPRODUCTOR DE MÚSICA --- */
        .music-player {
            width: 100%;
            max-width: 500px;
            margin-bottom: 40px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 12px 35px rgba(44, 74, 111, 0.08);
            border: 1px solid var(--ice-blue);
            background: var(--pure-white);
        }

        /* --- CUADRÍCULA DEL ÁLBUM SEMANAL --- */
        .weekly-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        /* --- MARCO POLAROID --- */
        .polaroid-frame {
            background: var(--pure-white);
            padding: 14px 14px 35px 14px;
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(44, 74, 111, 0.05);
            border: 1px solid rgba(168, 204, 235, 0.25);
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            box-sizing: border-box;
        }

        .polaroid-frame:nth-child(odd) { transform: rotate(-1deg); }
        .polaroid-frame:nth-child(even) { transform: rotate(1deg); }

        .polaroid-frame:hover {
            transform: scale(1.04) rotate(0deg) !important;
            box-shadow: 0 20px 40px rgba(44, 74, 111, 0.12);
            z-index: 15;
        }

        .polaroid-frame::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 75px;
            height: 20px;
            background: rgba(168, 204, 235, 0.35);
        }

        .img-holder {
            width: 100%;
            height: 250px;
            background: var(--bg-light-blue);
            overflow: hidden;
            border: 1px solid #eef3f8;
            border-radius: 2px;
        }

        .img-holder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .caption-text {
            font-family: 'Alex Brush', cursive;
            font-size: 2.2rem;
            margin-top: 15px;
            text-align: center;
            color: var(--deep-blue);
            line-height: 1;
        }

        .photo-number {
            position: absolute;
            bottom: 8px;
            right: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--sky-blue);
            opacity: 0.8;
        }

        /* --- BOTÓN REGRESAR --- */
        .footer-action {
            margin: 50px 0;
        }

        .btn-back {
            display: inline-block;
            background: var(--deep-blue);
            color: var(--bg-light-blue);
            padding: 12px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: var(--sky-blue);
            color: var(--deep-blue);
            transform: translateY(-2px);
        }
    </style>
</head>

    <!-- --- ANIMACIÓN: ICONOS Y NUEVAS FRASES SEMANALES --- -->
    <script>
        window.onload = function() {
            
            // Nuevas frases exclusivas para los recuerdos semanales
            const lovePhrases = [
                "Un dia mas amandote",
                "Coleccionando hermosos dias",
                "Cada momento contigo cuenta",
                "Nuestra semana perfecta",
                "Haces mis dias mas felices",
                "Mi lugar favorito es a tu lado"
            ];

            const loveIcons = ['🌹', '💐', '🏵️', '🤍', '✨', '🌿', '👑'];

            function createFallingElement() {
                const element = document.createElement('div');
                element.classList.add('falling-item');

                const isPhrase = Math.random() < 0.5;

                if (isPhrase) {
                    const phraseIndex = Math.floor(Math.random() * lovePhrases.length);
                    element.innerText = lovePhrases[phraseIndex];
                    element.style.fontFamily = "'Alex Brush', cursive";
                    element.style.fontSize = Math.floor(Math.random() * 6 + 26) + 'px'; 
                    element.style.color = "#2c4a6f"; 
                } else {
                    const iconIndex = Math.floor(Math.random() * loveIcons.length);
                    element.innerText = loveIcons[iconIndex];
                    element.style.fontSize = Math.floor(Math.random() * 12 + 20) + 'px'; 
                }
                
                element.style.left = (Math.random() * 90) + 'vw';
                
                const duration = (Math.random() * 4 + 8); 
                element.style.animationDuration = duration + 's';
                
                document.body.appendChild(element);
                
                setTimeout(() => {
                    element.remove();
                }, duration * 1000);
            }

            setInterval(createFallingElement, 700);
        };
    </script>
