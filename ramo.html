<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro Jardín de Recuerdos 🌿✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cinzel:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap');

        :root {
            --bg-cream: #fbf8f3; 
            --warm-sand: #f0e6df; 
            --rose-gold: #d4a373; 
            --deep-chestnut: #4a3b32; 
            --pure-white: #ffffff;
        }

        body {
            background-color: var(--bg-cream);
            color: var(--deep-chestnut);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- ELEMENTOS FLOTANTES ANIMADOS (FRASES E ICONOS) --- */
        .falling-item {
            position: fixed;
            top: -60px; 
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            user-select: none;
            white-space: nowrap;
            animation: fallAndSway linear forwards;
        }

        @keyframes fallAndSway {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 0;
            }
            15% {
                opacity: 0.7; 
            }
            85% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(105vh) translateX(100px) rotate(25deg); 
                opacity: 0;
            }
        }

        /* Contenedor principal por encima de la animación */
        .content-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .main-title {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            color: var(--deep-chestnut);
            margin: 0;
            letter-spacing: 3px;
        }

        .subtitle {
            font-family: 'Alex Brush', cursive;
            font-size: 2.6rem;
            color: var(--rose-gold);
            margin-top: 5px;
        }

        /* --- REPRODUCTOR DE MÚSICA --- */
        .music-player {
            width: 100%;
            max-width: 500px;
            margin-bottom: 50px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 12px 35px rgba(74, 59, 50, 0.1);
            border: 1px solid var(--warm-sand);
            background: var(--pure-white);
        }

        /* --- NUESTRA PELÍCULA (REPRODUCTOR YOUTUBE CORREGIDO) --- */
        .main-video-section {
            width: 100%;
            max-width: 700px;
            background: var(--pure-white);
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(74, 59, 50, 0.06);
            border: 1px solid rgba(212, 163, 115, 0.15);
            margin-bottom: 60px;
            box-sizing: border-box;
            text-align: center;
        }

        .video-title-box {
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            letter-spacing: 2px;
            color: var(--deep-chestnut);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .video-container {
            width: 100%;
            border-radius: 14px;
            overflow: hidden;
            background: #000;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
            aspect-ratio: 16 / 9;
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- ÁLBUM DE FOTOS ESTILO POLAROID --- */
        .album-section {
            width: 100%;
            text-align: center;
        }

        .album-title {
            font-family: 'Cinzel', serif;
            font-size: 1.6rem;
            color: var(--deep-chestnut);
            margin-bottom: 40px;
            letter-spacing: 2px;
            position: relative;
            display: inline-block;
            padding-bottom: 10px;
        }

        .album-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 25%;
            width: 50%;
            height: 1px;
            background: var(--rose-gold);
        }

        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            justify-content: center;
        }

        /* --- MARCO POLAROID --- */
        .polaroid-frame {
            background: var(--pure-white);
            padding: 16px 16px 40px 16px;
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(74, 59, 50, 0.08);
            border: 1px solid rgba(212, 163, 115, 0.15);
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            box-sizing: border-box;
        }

        .polaroid-frame:hover {
            transform: scale(1.04) rotate(1deg);
            box-shadow: 0 22px 45px rgba(74, 59, 50, 0.12);
        }

        .polaroid-frame::before {
            content: '';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 85px;
            height: 24px;
            background: rgba(212, 163, 115, 0.22);
        }

        .img-holder {
            width: 100%;
            height: 270px;
            background: var(--bg-cream);
            overflow: hidden;
            border: 1px solid #f2ece6;
            border-radius: 2px;
        }

        .img-holder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .caption-text {
            font-family: 'Alex Brush', cursive;
            font-size: 2.3rem;
            margin-top: 18px;
            text-align: center;
            color: var(--deep-chestnut);
            line-height: 1;
        }

        .flower-tag {
            position: absolute;
            bottom: 12px;
            right: 15px;
            font-size: 0.9rem;
            opacity: 0.5;
        }

        /* --- BOTÓN REGRESAR --- */
        .footer-action {
            margin: 60px 0;
        }

        .btn-back {
            display: inline-block;
            background: var(--deep-chestnut);
            color: var(--bg-cream);
            padding: 12px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: var(--rose-gold);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="content-wrapper">
        
        <header>
            <h1 class="main-title">Nuestro Jardín de Recuerdos</h1>
            <div class="subtitle">Helen & Brandon</div>
        </header>

        <div class="music-player">
            <iframe width="100%" height="200" src="https://www.youtube.com/embed/nihGvpDRLtM" title="Canción de Fondo" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen loading="lazy"></iframe>
        </div>

        <section class="main-video-section">
            <div class="video-title-box">
                <span>🎥</span>
                <span>Nuestra Película Favorita</span>
                <span>🎥</span>
            </div>
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/L4sbDxR22z4" title="Nuestra Película" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
            </div>
        </section>

        <section class="album-section">
            <h2 class="album-title">Colección de Instantes</h2>
            
            <div class="album-grid">
                
                <div class="polaroid-frame">
                    <div class="img-holder">
                        <img src="foto_rosas1.jpg" alt="Recuerdo de Rosas" onerror="this.src='https://placehold.co/400x400/f0e6df/4a3b32?text=Foto+de+Rosas+🌹'">
                    </div>
                    <div class="caption-text">El aroma de nuestra historia</div>
                    <div class="flower-tag">🌹</div>
                </div>

                <div class="polaroid-frame">
                    <div class="img-holder">
                        <img src="foto_lirios1.jpg" alt="Recuerdo de Lirios" onerror="this.src='https://placehold.co/400x400/f0e6df/4a3b32?text=Foto+de+Lirios+💐'">
                    </div>
                    <div class="caption-text">Elegancia, amor y fuerza</div>
                    <div class="flower-tag">💐</div>
                </div>

                <div class="polaroid-frame">
                    <div class="img-holder">
                        <img src="foto_gerberas1.jpg" alt="Recuerdo de Gerberas" onerror="this.src='https://placehold.co/400x400/f0e6df/4a3b32?text=Foto+de+Gerberas+🏵️'">
                    </div>
                    <div class="caption-text">La sonrisa más perfecta</div>
                    <div class="flower-tag">🏵️</div>
                </div>

                <div class="polaroid-frame">
                    <div class="img-holder">
                        <img src="foto_juntos1.jpg" alt="Momento Especial" onerror="this.src='https://placehold.co/400x400/f0e6df/4a3b32?text=Un+Día+Especial+✨'">
                    </div>
                    <div class="caption-text">Tú y yo por siempre</div>
                    <div class="flower-tag">✨</div>
                </div>

            </div>
        </section>

        <footer class="footer-action">
            <a href="index.html" class="btn-back">← VOLVER AL MENÚ</a>
        </footer>

    </div>

    <script>
        window.onload = function() {
            
            const lovePhrases = [
                "A donde tu vayas te seguire",
                "Me entrego a ti mi amor",
                "Quiero casarme contigo",
                "Somos tu y yo",
                "Eres el amor de mi vida"
            ];

            const loveIcons = ['🌹', '💐', '🏵️', '🤍', '✨', '🌿', '👑'];

            function createFallingElement() {
                const element = document.createElement('div');
                element.classList.add('falling-item');

                const isPhrase = Math.random() < 0.5;

                if (isPhrase) {
                    const phraseIndex = Math.floor(Math.random() * lovePhrases.length);
                    element.innerText = lovePhrases[phraseIndex];
                    element.style.fontFamily = "'Alex Brush', cursive";
                    element.style.fontSize = Math.floor(Math.random() * 6 + 26) + 'px'; 
                    element.style.color = "#d4a373"; 
                } else {
                    const iconIndex = Math.floor(Math.random() * loveIcons.length);
                    element.innerText = loveIcons[iconIndex];
                    element.style.fontSize = Math.floor(Math.random() * 12 + 20) + 'px'; 
                }
                
                element.style.left = (Math.random() * 90) + 'vw';
                
                const duration = (Math.random() * 4 + 8); 
                element.style.animationDuration = duration + 's';
                
                document.body.appendChild(element);
                
                setTimeout(() => {
                    element.remove();
                }, duration * 1000);
            }

            setInterval(createFallingElement, 700);
        };
    </script>
</body>
</html>
